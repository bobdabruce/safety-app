<!DOCTYPE html>
<html lang="km">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="រៀន AI">
<meta name="theme-color" content="#6d28d9">
<link rel="manifest" href="/guide/manifest.json">
<title>រៀន AI</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --border: #334155;
    --accent: #6d28d9;
    --accent2: #7c3aed;
    --gold: #f59e0b;
    --green: #10b981;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --radius: 16px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'Khmer OS', 'Khmer OS System', sans-serif;
    font-size: 17px;
    line-height: 1.6;
    overflow: hidden;
  }

  /* ── Screens ── */
  .screen { position: absolute; inset: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; display: none; flex-direction: column; padding-bottom: 80px; }
  .screen.active { display: flex; }

  /* ── Top bar ── */
  .topbar {
    position: sticky; top: 0; z-index: 10;
    background: var(--bg);
    padding: 52px 20px 12px;
    display: flex; align-items: center; gap: 12px;
  }
  .topbar h1 { font-size: 22px; font-weight: 700; flex: 1; }
  .lang-btn {
    background: var(--card); border: 1px solid var(--border);
    color: var(--text); padding: 6px 14px; border-radius: 20px;
    font-size: 14px; cursor: pointer;
  }

  /* ── Bottom nav ── */
  .nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(15,23,42,0.95);
    backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
    display: flex;
    padding-bottom: env(safe-area-inset-bottom);
    z-index: 100;
  }
  .nav-btn {
    flex: 1; padding: 10px 4px 8px;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    cursor: pointer; border: none; background: none;
    color: var(--muted); font-size: 11px;
    transition: color 0.2s;
  }
  .nav-btn.active { color: var(--accent2); }
  .nav-btn .icon { font-size: 22px; }

  /* ── Cards ── */
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 18px; margin: 0 16px 12px;
  }
  .card-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
  .card-sub { font-size: 14px; color: var(--muted); }

  /* ── Progress ring ── */
  .progress-wrap {
    display: flex; flex-direction: column; align-items: center;
    padding: 20px 20px 8px;
  }
  .ring-wrap { position: relative; width: 110px; height: 110px; margin-bottom: 12px; }
  .ring-wrap svg { transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: var(--border); stroke-width: 8; }
  .ring-fill { fill: none; stroke: var(--accent2); stroke-width: 8; stroke-linecap: round;
    transition: stroke-dashoffset 0.6s ease; }
  .ring-text { position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; }
  .ring-pct { font-size: 24px; font-weight: 700; }
  .ring-label { font-size: 11px; color: var(--muted); }

  /* ── Month tabs ── */
  .month-tabs { display: flex; gap: 8px; padding: 0 16px 12px; overflow-x: auto; }
  .month-tab {
    flex-shrink: 0; padding: 8px 16px; border-radius: 20px;
    border: 1px solid var(--border); background: none;
    color: var(--muted); font-size: 14px; cursor: pointer;
    white-space: nowrap;
  }
  .month-tab.active { background: var(--accent); border-color: var(--accent); color: white; }

  /* ── Week card ── */
  .week-card {
    margin: 0 16px 10px; border-radius: var(--radius);
    border: 1px solid var(--border); overflow: hidden;
    background: var(--card);
  }
  .week-header {
    padding: 14px 16px; display: flex; align-items: center; gap: 10px;
    cursor: pointer;
  }
  .week-icon { font-size: 22px; }
  .week-info { flex: 1; }
  .week-title { font-size: 15px; font-weight: 600; }
  .week-progress { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .week-arrow { color: var(--muted); transition: transform 0.2s; font-size: 14px; }
  .week-card.open .week-arrow { transform: rotate(90deg); }

  .week-lessons { display: none; border-top: 1px solid var(--border); }
  .week-card.open .week-lessons { display: block; }

  .lesson-row {
    padding: 12px 16px; display: flex; align-items: center; gap: 12px;
    cursor: pointer; border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  .lesson-row:last-child { border-bottom: none; }
  .lesson-row:active { background: rgba(109,40,217,0.1); }
  .lesson-check {
    width: 26px; height: 26px; border-radius: 50%;
    border: 2px solid var(--border); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; transition: all 0.2s;
  }
  .lesson-check.done { background: var(--green); border-color: var(--green); }
  .lesson-info { flex: 1; }
  .lesson-title { font-size: 15px; }
  .lesson-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .lesson-arrow { color: var(--muted); font-size: 13px; }

  /* ── Lesson screen ── */
  .lesson-topbar {
    position: sticky; top: 0; z-index: 10;
    background: var(--bg); padding: 52px 16px 12px;
    display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid var(--border);
  }
  .back-btn {
    background: var(--card); border: 1px solid var(--border);
    color: var(--text); padding: 8px 14px; border-radius: 10px;
    font-size: 15px; cursor: pointer; white-space: nowrap;
  }
  .lesson-topbar h2 { font-size: 17px; font-weight: 600; flex: 1; line-height: 1.3; }

  .lesson-body { padding: 20px 16px; }
  .lesson-duration {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--card); border: 1px solid var(--border);
    padding: 5px 12px; border-radius: 20px; font-size: 13px;
    color: var(--muted); margin-bottom: 18px;
  }
  .lesson-content { font-size: 17px; line-height: 1.75; }
  .lesson-content h3 { font-size: 18px; font-weight: 600; margin: 20px 0 10px; color: var(--accent2); }
  .lesson-content p { margin-bottom: 14px; }
  .lesson-content ul, .lesson-content ol { padding-left: 22px; margin-bottom: 14px; }
  .lesson-content li { margin-bottom: 8px; }
  .lesson-content .step {
    background: var(--card); border-left: 3px solid var(--accent2);
    padding: 12px 14px; border-radius: 0 10px 10px 0;
    margin-bottom: 10px; font-size: 16px;
  }
  .lesson-content .tip {
    background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.3);
    padding: 12px 14px; border-radius: 10px; margin: 14px 0;
    font-size: 15px;
  }
  .lesson-content .tip::before { content: "💡 "; }

  .complete-btn {
    width: 100%; padding: 16px; margin-top: 24px;
    background: var(--accent); border: none; border-radius: var(--radius);
    color: white; font-size: 18px; font-weight: 600; cursor: pointer;
    transition: background 0.2s;
  }
  .complete-btn:active { background: var(--accent2); }
  .complete-btn.done { background: var(--green); }

  /* ── Tools screen ── */
  .tools-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 16px; }
  .tool-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 18px 14px; text-align: center;
    text-decoration: none; color: var(--text);
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    cursor: pointer;
  }
  .tool-card:active { border-color: var(--accent2); }
  .tool-icon { font-size: 36px; }
  .tool-name { font-size: 15px; font-weight: 600; }
  .tool-desc { font-size: 12px; color: var(--muted); line-height: 1.4; }

  /* ── Settings screen ── */
  .setting-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px; background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); margin: 0 16px 10px;
  }
  .setting-label { font-size: 16px; }
  .setting-sub { font-size: 13px; color: var(--muted); margin-top: 2px; }
  .toggle {
    width: 50px; height: 28px; background: var(--border); border-radius: 14px;
    position: relative; cursor: pointer; transition: background 0.2s;
    border: none; flex-shrink: 0;
  }
  .toggle.on { background: var(--green); }
  .toggle::after {
    content: ''; position: absolute; width: 22px; height: 22px;
    background: white; border-radius: 50%; top: 3px; left: 3px;
    transition: transform 0.2s;
  }
  .toggle.on::after { transform: translateX(22px); }

  /* ── Celebration ── */
  .celebrate {
    position: fixed; inset: 0; z-index: 200; display: none;
    align-items: center; justify-content: center;
    background: rgba(0,0,0,0.7);
  }
  .celebrate.show { display: flex; }
  .celebrate-box {
    background: var(--card); border: 1px solid var(--accent2);
    border-radius: 24px; padding: 32px 24px; text-align: center;
    max-width: 280px; margin: 20px;
  }
  .celebrate-emoji { font-size: 64px; margin-bottom: 16px; }
  .celebrate-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .celebrate-sub { font-size: 16px; color: var(--muted); margin-bottom: 20px; }
  .celebrate-ok {
    width: 100%; padding: 14px; background: var(--accent);
    border: none; border-radius: 12px; color: white;
    font-size: 17px; font-weight: 600; cursor: pointer;
  }
</style>
</head>
<body>

<!-- ── HOME SCREEN ── -->
<div class="screen active" id="screen-home">
  <div class="topbar">
    <h1 id="home-title">រៀន AI 🤖</h1>
    <button class="lang-btn" onclick="toggleLang()">EN</button>
  </div>

  <div class="progress-wrap">
    <div class="ring-wrap">
      <svg width="110" height="110" viewBox="0 0 110 110">
        <circle class="ring-bg" cx="55" cy="55" r="46"/>
        <circle class="ring-fill" id="ringFill" cx="55" cy="55" r="46"
          stroke-dasharray="289" stroke-dashoffset="289"/>
      </svg>
      <div class="ring-text">
        <span class="ring-pct" id="ringPct">0%</span>
        <span class="ring-label" id="ringLabel">រួចហើយ</span>
      </div>
    </div>
    <p id="home-sub" style="font-size:14px;color:var(--muted);text-align:center"></p>
  </div>

  <div class="month-tabs" id="monthTabs"></div>
  <div id="weekList"></div>
</div>

<!-- ── LESSON SCREEN ── -->
<div class="screen" id="screen-lesson">
  <div class="lesson-topbar">
    <button class="back-btn" onclick="showScreen('home')" id="backBtn">← ត្រឡប់</button>
    <h2 id="lessonTitle"></h2>
  </div>
  <div class="lesson-body">
    <div class="lesson-duration" id="lessonDuration"></div>
    <div class="lesson-content" id="lessonContent"></div>
    <button class="complete-btn" id="completeBtn" onclick="completeLesson()"></button>
  </div>
</div>

<!-- ── TOOLS SCREEN ── -->
<div class="screen" id="screen-tools">
  <div class="topbar">
    <h1 id="tools-title">ឧបករណ៍ AI 🛠️</h1>
    <button class="lang-btn" onclick="toggleLang()">EN</button>
  </div>
  <div class="tools-grid" id="toolsGrid"></div>
</div>

<!-- ── SETTINGS SCREEN ── -->
<div class="screen" id="screen-settings">
  <div class="topbar">
    <h1 id="settings-title">ការកំណត់ ⚙️</h1>
    <button class="lang-btn" onclick="toggleLang()">EN</button>
  </div>
  <div class="setting-row">
    <div>
      <div class="setting-label" id="notif-label">ការជូនដំណឹងប្រចាំថ្ងៃ</div>
      <div class="setting-sub" id="notif-sub">រំឭកអ្នករៀនរាល់ថ្ងៃ</div>
    </div>
    <button class="toggle" id="notifToggle" onclick="toggleNotif()"></button>
  </div>
  <div class="setting-row">
    <div>
      <div class="setting-label" id="lang-label">ភាសា</div>
      <div class="setting-sub" id="lang-sub">ភាសាខ្មែរ ឬ English</div>
    </div>
    <button class="lang-btn" onclick="toggleLang()" id="langToggleBtn">EN</button>
  </div>
  <div class="setting-row" style="cursor:pointer" onclick="resetProgress()">
    <div>
      <div class="setting-label" id="reset-label" style="color:#ef4444">លុបចោលវឌ្ឍនភាព</div>
      <div class="setting-sub" id="reset-sub">ចាប់ផ្តើមម្តងទៀត</div>
    </div>
    <span style="color:var(--muted)">›</span>
  </div>
  <div style="padding:20px 16px;text-align:center;color:var(--muted);font-size:13px">
    រៀន AI · v1.1 · Made with ❤️
  </div>
</div>

<!-- ── BOTTOM NAV ── -->
<div class="nav">
  <button class="nav-btn active" id="nav-home" onclick="showScreen('home')">
    <span class="icon">🏠</span>
    <span id="nav-home-label">ផ្ទះ</span>
  </button>
  <button class="nav-btn" id="nav-tools" onclick="showScreen('tools')">
    <span class="icon">🛠️</span>
    <span id="nav-tools-label">ឧបករណ៍</span>
  </button>
  <button class="nav-btn" id="nav-settings" onclick="showScreen('settings')">
    <span class="icon">⚙️</span>
    <span id="nav-settings-label">ការកំណត់</span>
  </button>
</div>

<!-- ── CELEBRATION POPUP ── -->
<div class="celebrate" id="celebrate">
  <div class="celebrate-box">
    <div class="celebrate-emoji" id="celebEmoji">🎉</div>
    <div class="celebrate-title" id="celebTitle"></div>
    <div class="celebrate-sub" id="celebSub"></div>
    <button class="celebrate-ok" id="celebOk" onclick="closeCelebrate()"></button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
// LANGUAGE
// ══════════════════════════════════════════════
let lang = localStorage.getItem('lang') || 'kh';

const UI = {
  kh: {
    home: 'រៀន AI 🤖', tools: 'ឧបករណ៍ AI 🛠️', settings: 'ការកំណត់ ⚙️',
    navHome: 'ផ្ទះ', navTools: 'ឧបករណ៍', navSettings: 'ការកំណត់',
    done: 'រួចហើយ', back: '← ត្រឡប់', complete: '✅ រួចហើយ!',
    alreadyDone: '✅ បានរួចហើយ', weeksOf: 'ជំហាន', lessonOf: 'មេរៀន',
    notifLabel: 'ការជូនដំណឹងប្រចាំថ្ងៃ', notifSub: 'រំឭកអ្នករៀនរាល់ថ្ងៃ',
    langLabel: 'ភាសា', langSub: 'ភាសាខ្មែរ ឬ English',
    resetLabel: 'លុបចោលវឌ្ឍនភាព', resetSub: 'ចាប់ផ្តើមម្តងទៀត',
    resetConfirm: 'តើអ្នកចង់ចាប់ផ្តើមម្តងទៀតទេ?',
    celebOk: 'អស្ចារ្យណាស់! 💪',
    minLabel: 'នាទី',
  },
  en: {
    home: 'Learn AI 🤖', tools: 'AI Tools 🛠️', settings: 'Settings ⚙️',
    navHome: 'Home', navTools: 'Tools', navSettings: 'Settings',
    done: 'Done', back: '← Back', complete: '✅ Mark Complete!',
    alreadyDone: '✅ Completed', weeksOf: 'step', lessonOf: 'lesson',
    notifLabel: 'Daily Reminder', notifSub: 'Remind you to learn every day',
    langLabel: 'Language', langSub: 'Khmer or English',
    resetLabel: 'Reset Progress', resetSub: 'Start over from the beginning',
    resetConfirm: 'Reset all your progress?',
    celebOk: 'Awesome! 💪',
    minLabel: 'min',
  }
};

function t(key) { return UI[lang][key] || UI.en[key]; }

function toggleLang() {
  lang = lang === 'kh' ? 'en' : 'kh';
  localStorage.setItem('lang', lang);
  applyLang();
  renderHome();
  renderTools();
}

function applyLang() {
  const isEn = lang === 'en';
  document.documentElement.lang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.textContent = isEn ? 'ខ្មែរ' : 'EN');
  document.getElementById('home-title').textContent = t('home');
  document.getElementById('tools-title').textContent = t('tools');
  document.getElementById('settings-title').textContent = t('settings');
  document.getElementById('nav-home-label').textContent = t('navHome');
  document.getElementById('nav-tools-label').textContent = t('navTools');
  document.getElementById('nav-settings-label').textContent = t('navSettings');
  document.getElementById('notif-label').textContent = t('notifLabel');
  document.getElementById('notif-sub').textContent = t('notifSub');
  document.getElementById('lang-label').textContent = t('langLabel');
  document.getElementById('lang-sub').textContent = t('langSub');
  document.getElementById('reset-label').textContent = t('resetLabel');
  document.getElementById('reset-sub').textContent = t('resetSub');
  document.getElementById('ringLabel').textContent = t('done');
  document.getElementById('langToggleBtn').textContent = isEn ? 'ខ្មែរ' : 'EN';
  if (document.getElementById('screen-lesson').classList.contains('active')) {
    document.getElementById('backBtn').textContent = t('back');
  }
}

// ══════════════════════════════════════════════
// CURRICULUM DATA
// ══════════════════════════════════════════════
const curriculum = [
  // ── MONTH 1 ────────────────────────────────
  {
    id: 1,
    kh: 'ខែទី ១ — ចាប់ផ្តើម បង្កើត',
    en: 'Month 1 — Start Creating',
    icon: '🎬',
    weeks: [
      // ── Week 1: Quick Setup ──────────────────
      {
        id: '1-1', icon: '🌱',
        kh: 'Setup រហ័ស', en: 'Quick Setup',
        lessons: [
          {
            id: 'L1-1-1',
            kh: 'AI ពន្យល់ដោយភាសាសាមញ្ញ', en: 'AI explained simply',
            mins: 5,
            content: {
              kh: `<h3>AI គឺជាអ្វី?</h3>
<p>AI មានន័យថា <strong>បញ្ញាសិប្បនិម្មិត</strong> — ឬក្នុងភាសាសាមញ្ញ: <strong>ដូចជាខួរក្បាលរបស់កុំព្យូទ័រ ប៉ុន្តែ វាអាចរៀនដោយខ្លួនឯង។</strong></p>
<p>គិតថា AI ដូចជាមិត្តស្និទ្ធ ដែល:</p>
<ul>
  <li>ចេះភាសាខ្មែរ ភាសាអង់គ្លេស និងភាសាជាច្រើន</li>
  <li>អាចជួយអ្នករចនាគំនូរ ឬរូបភាព</li>
  <li>អាចបកប្រែ ឬសរសេរអត្ថបទជូន</li>
  <li>ឆ្លើយសំណួររបស់អ្នក ២៤ ម៉ោង/ថ្ងៃ</li>
</ul>
<div class="tip">AI មិនមែនជាមនុស្សទេ — ប៉ុន្តែ វាអាចជួយអ្នកបានច្រើន!</div>
<h3>អ្នកប្រើ AI រួចហើយ ដោយមិនដឹងខ្លួន:</h3>
<ul>
  <li>🎵 TikTok ណែនាំវីដេអូឱ្យអ្នក → AI</li>
  <li>📸 ការស្គាល់មុខក្នុង iPhone → AI</li>
  <li>⌨️ Auto-correct ពេលវាយ → AI</li>
  <li>🗺️ Google Maps ផ្លូវ → AI</li>
</ul>`,
              en: `<h3>What is AI?</h3>
<p>AI stands for <strong>Artificial Intelligence</strong> — in simple words: <strong>a computer that can learn and think on its own.</strong></p>
<p>Think of AI like a very helpful friend who:</p>
<ul>
  <li>Speaks Khmer, English, and many languages</li>
  <li>Can help design pictures and images</li>
  <li>Can translate or write text for you</li>
  <li>Answers your questions 24 hours a day</li>
</ul>
<div class="tip">AI is not a person — but it can help you a LOT!</div>
<h3>You already use AI every day:</h3>
<ul>
  <li>🎵 TikTok recommends videos → AI</li>
  <li>📸 Face recognition on iPhone → AI</li>
  <li>⌨️ Auto-correct when you type → AI</li>
  <li>🗺️ Google Maps directions → AI</li>
</ul>`
            }
          },

  <li>✅ ជួយបកប្រែ</li>
  <li>✅ ជួយគិតគំនិតចំពោះការ post វីដេអូ</li>
  <li>✅ ជួយឆ្លើយសំណួរ</li>
  <li>✅ ជួយរចនារូបភាព ឬ thumbnail</li>

<ul>
  <li>❌ មិនអាចដឹងពិតប្រាកដ ១០០%</li>
  <li>❌ ពេលខ្លះ AI ប្រាប់ខុស — ត្រូវពិនិត្យ</li>
  <li>❌ មិនអាចជំនួសការរៀនសូត្ររបស់អ្នក</li>
</ul>
<div class="tip">AI ជួយអ្នក ប៉ុន្តែ <strong>អ្នក</strong>ជាអ្នកសម្រេច!</div>`,
              en: `<h3>What AI can help you with:</h3>
<ul>
  <li>✅ Writing captions in Khmer or English</li>
  <li>✅ Translating text</li>
  <li>✅ Coming up with ideas for videos</li>
  <li>✅ Answering your questions</li>
  <li>✅ Designing images or thumbnails</li>
</ul>
<h3>What AI cannot do:</h3>
<ul>
  <li>❌ It's not always 100% accurate</li>
  <li>❌ Sometimes AI gets things wrong — always check</li>
  <li>❌ It can't replace your own learning</li>
</ul>
<div class="tip">AI helps you — but <strong>YOU</strong> make the decisions!</div>`

            content: {
              kh: `<h3>Wi-Fi vs. Mobile Data</h3>
<p><strong>Wi-Fi 📶</strong> — ភ្ជាប់ router ក្នុងផ្ទះ ឬ ហាងកាហ្វេ</p>
<ul>
  <li>✅ ឥតគិតថ្លៃ (ប្រើអស់ប៉ុណ្ណា ក៏ OK)</li>
  <li>✅ ល្បឿនលឿន</li>
  <li>❌ ប្រើបានតែនៅក្បែរ router</li>
</ul>
<p><strong>Mobile Data 📡</strong> — ប្រើ internet គ្រប់ទីកន្លែង</p>
<ul>
  <li>✅ ប្រើបានគ្រប់ទីកន្លែង</li>
  <li>❌ ប្រើ data ផ្ទាល់ (អាចអស់)</li>
  <li>❌ អាចថ្លៃ</li>
</ul>
<div class="tip">ពេល download apps ធំ ឬ upload វីដេអូ — ប្រើ Wi-Fi ជានិច្ច!</div>`,
              en: `<h3>Wi-Fi vs. Mobile Data</h3>
<p><strong>Wi-Fi 📶</strong> — connects to a router at home or a café</p>
<ul>
  <li>✅ Free (use as much as you want)</li>
  <li>✅ Fast speed</li>
  <li>❌ Only works near the router</li>
</ul>
<p><strong>Mobile Data 📡</strong> — uses internet anywhere</p>
<ul>
  <li>✅ Works anywhere</li>
  <li>❌ Uses your data plan (can run out)</li>
  <li>❌ Can be expensive</li>
</ul>
<div class="tip">When downloading large apps or uploading videos — always use Wi-Fi!</div>`
            }

              kh: `<h3>iPhone 11 = កាមេរ៉ា A+</h3>

<h3>Best settings for TikTok:</h3>
<div class="step">1️⃣ Open Camera → choose <strong>VIDEO</strong></div>
<div class="step">2️⃣ Hold phone <strong>VERTICAL</strong> — TikTok uses 9:16</div>
<div class="step">3️⃣ Tap the screen to focus on your subject</div>
<div class="step">4️⃣ Tap the sun icon 🌞 → drag down to reduce brightness</div>
<h3>Tips for great shots:</h3>
<ul>
  <li>💡 Use <strong>natural light</strong> — film near a window</li>
  <li>🔇 Film in a <strong>quiet place</strong> so sound is clear</li>

// ══════════════════════════════════════════════
// PROGRESS
// ══════════════════════════════════════════════
function getProgress() { return JSON.parse(localStorage.getItem('progress') || '{}'); }
function saveProgress(p) { localStorage.setItem('progress', JSON.stringify(p)); }
function isDone(id) { return !!getProgress()[id]; }
function markDone(id) { const p = getProgress(); p[id] = 1; saveProgress(p); }

function totalLessons() {
  return curriculum.reduce((a, m) => a + m.weeks.reduce((b, w) => b + w.lessons.length, 0), 0);
}
function doneLessons() {
  const p = getProgress();
  return curriculum.reduce((a, m) => a + m.weeks.reduce((b, w) =>
    b + w.lessons.filter(l => p[l.id]).length, 0), 0);
}
function weekDone(week) {
  return week.lessons.filter(l => isDone(l.id)).length;
}

// ══════════════════════════════════════════════
// SCREENS
// ══════════════════════════════════════════════
let currentScreen = 'home';

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  const navBtn = document.getElementById('nav-' + name);
  if (navBtn) navBtn.classList.add('active');
  currentScreen = name;
  if (name === 'home') renderHome();
  if (name === 'tools') renderTools();
}

// ══════════════════════════════════════════════
// HOME RENDER
// ══════════════════════════════════════════════
let activeMth = 0;

function renderHome() {
  const done = doneLessons(), total = totalLessons();
  const pct = total ? Math.round(done / total * 100) : 0;
  const circ = 289;
  document.getElementById('ringPct').textContent = pct + '%';
  document.getElementById('ringFill').style.strokeDashoffset = circ - (circ * pct / 100);

  const weeksTotal = curriculum.reduce((a,m) => a + m.weeks.length, 0);
  const weeksDone  = curriculum.reduce((a,m) => a + m.weeks.filter(w => weekDone(w) === w.lessons.length).length, 0);
  document.getElementById('home-sub').textContent = lang === 'kh'
    ? `${done} / ${total} មេរៀន · ${weeksDone} / ${weeksTotal} ជំហាន`
    : `${done} / ${total} lessons · ${weeksDone} / ${weeksTotal} weeks`;

  // Month tabs
  const tabs = document.getElementById('monthTabs');
  tabs.innerHTML = '';
  curriculum.forEach((m, i) => {
    const b = document.createElement('button');
    b.className = 'month-tab' + (i === activeMth ? ' active' : '');
    b.textContent = `${m.icon} ${lang === 'kh' ? m.kh : m.en}`;
    b.onclick = () => { activeMth = i; renderHome(); };
    tabs.appendChild(b);
  });

  // Week list
  const list = document.getElementById('weekList');
  list.innerHTML = '';
  curriculum[activeMth].weeks.forEach(week => {
    const done = weekDone(week), total = week.lessons.length;
    const div = document.createElement('div');
    div.className = 'week-card';
    div.innerHTML = `
      <div class="week-header" onclick="toggleWeek(this.parentElement)">
        <span class="week-icon">${week.icon}</span>
        <div class="week-info">
          <div class="week-title">${lang === 'kh' ? week.kh : week.en}</div>
          <div class="week-progress">${done}/${total} ${lang === 'kh' ? 'មេរៀន' : 'lessons'} ${done === total && total > 0 ? '✅' : ''}</div>
        </div>
        <span class="week-arrow">›</span>
      </div>
      <div class="week-lessons">${week.lessons.map(l => `
        <div class="lesson-row" onclick="openLesson('${l.id}')">
          <div class="lesson-check ${isDone(l.id) ? 'done' : ''}">${isDone(l.id) ? '✓' : ''}</div>
          <div class="lesson-info">
            <div class="lesson-title">${lang === 'kh' ? l.kh : l.en}</div>
            <div class="lesson-meta">⏱ ${l.mins} ${lang === 'kh' ? 'នាទី' : 'min'}</div>
          </div>
          <span class="lesson-arrow">›</span>
        </div>`).join('')}
      </div>`;
    list.appendChild(div);
  });
}

function toggleWeek(card) {
  card.classList.toggle('open');
}

// ══════════════════════════════════════════════
// LESSON
// ══════════════════════════════════════════════
let currentLessonId = null;

function openLesson(id) {
  const lesson = findLesson(id);
  if (!lesson) return;
  currentLessonId = id;

  document.getElementById('backBtn').textContent = t('back');
  document.getElementById('lessonTitle').textContent = lang === 'kh' ? lesson.kh : lesson.en;
  document.getElementById('lessonDuration').innerHTML = `⏱ ${lesson.mins} ${lang === 'kh' ? 'នាទី' : 'min'}`;
  document.getElementById('lessonContent').innerHTML = lesson.content[lang] || lesson.content.en;

  const btn = document.getElementById('completeBtn');
  if (isDone(id)) {
    btn.textContent = t('alreadyDone');
    btn.className = 'complete-btn done';
  } else {
    btn.textContent = t('complete');
    btn.className = 'complete-btn';
  }

  showScreen('lesson');
  document.getElementById('screen-lesson').scrollTop = 0;
}

function findLesson(id) {
  for (const m of curriculum) for (const w of m.weeks)
    for (const l of w.lessons) if (l.id === id) return l;
  return null;
}

function completeLesson() {
  if (!currentLessonId) return;
  markDone(currentLessonId);

  const btn = document.getElementById('completeBtn');
  btn.textContent = t('alreadyDone');
  btn.className = 'complete-btn done';

  // Celebration
  const done = doneLessons(), total = totalLessons();
  const pct = Math.round(done / total * 100);
  let emoji = '🎉', title, sub;
  if (lang === 'kh') {
    title = 'ល្អណាស់! 🌟';
    sub = `អ្នកបានរៀន ${done} / ${total} មេរៀន (${pct}%)`;
  } else {
    title = 'Well done! 🌟';
    sub = `You completed ${done} / ${total} lessons (${pct}%)`;
  }
  if (pct >= 100) { emoji = '🏆'; title = lang === 'kh' ? 'ជោគជ័យ! 🏆' : 'You did it! 🏆'; }
  else if (pct >= 50) emoji = '🔥';

  document.getElementById('celebEmoji').textContent = emoji;
  document.getElementById('celebTitle').textContent = title;
  document.getElementById('celebSub').textContent = sub;
  document.getElementById('celebOk').textContent = t('celebOk');
  document.getElementById('celebrate').classList.add('show');
}

function closeCelebrate() {
  document.getElementById('celebrate').classList.remove('show');
}

// ══════════════════════════════════════════════
// NOTIFICATIONS
// ══════════════════════════════════════════════
const notifKey = 'notifOn';

function updateNotifToggle() {
  const on = localStorage.getItem(notifKey) === '1';
  const btn = document.getElementById('notifToggle');
  btn.className = 'toggle' + (on ? ' on' : '');
}

async function toggleNotif() {
  const on = localStorage.getItem(notifKey) === '1';
  if (!on) {
    if ('Notification' in window) {
      const perm = await Notification.requestPermission();
      if (perm === 'granted') {
        localStorage.setItem(notifKey, '1');
        scheduleReminder();
      }
    }
  } else {
    localStorage.setItem(notifKey, '0');
  }
  updateNotifToggle();
}

function scheduleReminder() {
  if (!('serviceWorker' in navigator)) return;
  navigator.serviceWorker.ready.then(reg => {
    setTimeout(() => {
      reg.showNotification('រៀន AI 🤖', {
        body: lang === 'kh' ? 'ពេលវេលារៀន AI! ចំណាយ ១០ នាទី 💪' : 'Time to learn AI! Just 10 minutes 💪',
        icon: '/guide/icon.png',
        badge: '/guide/icon.png',
        tag: 'daily-reminder',
        renotify: true
      });
    }, 5000);
  });
}

function resetProgress() {
  if (confirm(t('resetConfirm'))) {
    localStorage.removeItem('progress');
    renderHome();
  }
}
